syntax = "proto2";

// The packet the robot should send back
message Robot_CP {
  required uint32 robot_id = 1;

  optional uint32 battery_voltage = 2;
  optional uint32 current = 3;

  required bool kicker_ready = 4;
  required bool has_ball = 5;

  optional bool has_error = 6;

  optional bool acting = 7;
  optional uint32 last_rec_packet = 8;
}
